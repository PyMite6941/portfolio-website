<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Contact Matt Gresham — send a message directly from the portfolio." />
		<link
			rel="stylesheet"
			type="text/css"
			href="../index.css" />
		<script
			src="../assets/js/site-style.js"
			data-depth="1"></script>

		<title>Matt G | Contact</title>
	</head>
	<body>
		<div class="site-nav"></div>
		<header class="hero-section">
			<h1>Matt G</h1>
			<h3>Contact Me</h3>
		</header>
		<main>
			<form
				class="contact-me"
				action="https://formspree.io/f/xqegrqdb"
				method="POST">
				<label for="name">Name:</label><br />
				<input
					type="text"
					id="name"
					name="name"
					required /><br />
				<label for="email">Email:</label><br />
				<input
					type="email"
					id="email"
					name="email"
					required /><br />
				<label for="message">Message:</label><br />
				<textarea
					id="message"
					name="message"
					rows="5"
					required></textarea
				><br />
				<button type="submit">Send</button>
			</form>
		</main>
		<div class="site-footer"></div>
	</body>
</html>
